spring.application.name=search-by-image

spring.datasource.url=jdbc:postgresql://${DB_HOST:192.168.0.20}:${DB_PORT:5433}/${DB_NAME:image_search_data}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.data.jpa.repositories.enabled=false

# Use Flyway for db/migration scripts to avoid ScriptUtils limitations.
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

clip.service.url=${CLIP_SERVICE_URL:http://192.168.0.20:8000}

image-search.default-limit=100
image-search.max-limit=500
image-search.similarity-threshold=0.5

product-search.default-limit=20
product-search.max-limit=60
product-search.suggestion-limit=8

server.port=8282
