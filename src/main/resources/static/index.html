<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search by Image</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        h1 { text-align: center; margin: 20px 0 30px; font-size: 1.8rem; color: #1a1a1a; }

        /* Search Panel */
        .search-panel {
            background: #fff; border-radius: 12px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
        }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab {
            padding: 8px 20px; border: 2px solid #e0e0e0; border-radius: 8px;
            background: #fff; cursor: pointer; font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s;
        }
        .tab.active { border-color: #4f46e5; color: #4f46e5; background: #eef2ff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Upload area */
        .upload-area {
            border: 2px dashed #d0d0d0; border-radius: 10px; padding: 40px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            position: relative;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #4f46e5; background: #fafafe; }
        .upload-area input[type="file"] { display: none; }
        .upload-area p { color: #888; margin-top: 8px; }
        .upload-area .icon { font-size: 2rem; }

        .preview-container { margin-top: 16px; text-align: center; }
        .preview-container img { max-height: 200px; max-width: 100%; border-radius: 8px; object-fit: contain; }

        /* URL input */
        .url-input-group { display: flex; gap: 10px; }
        .url-input-group input {
            flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        .url-input-group input:focus { border-color: #4f46e5; }

        /* Controls */
        .controls { display: flex; gap: 16px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
        .control-group { display: flex; align-items: center; gap: 6px; }
        .control-group label { font-size: 0.85rem; color: #666; font-weight: 500; }
        .control-group input, .control-group select {
            padding: 6px 10px; border: 1.5px solid #e0e0e0; border-radius: 6px;
            font-size: 0.85rem; width: 80px;
        }

        .btn {
            padding: 10px 28px; border: none; border-radius: 8px; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: #4f46e5; color: #fff; margin-left: auto; }
        .btn-primary:hover { background: #4338ca; }
        .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

        /* Loading */
        .loading { text-align: center; padding: 40px; display: none; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e0e0e0;
            border-top-color: #4f46e5; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results-header { margin-bottom: 16px; font-size: 1rem; color: #666; }
        .results-header span { font-weight: 700; color: #333; }

        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .product-card {
            background: #fff; border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }

        .product-card .image-wrapper {
            width: 100%; aspect-ratio: 1; background: #f9f9f9; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .product-card .image-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .product-card .info { padding: 12px; }
        .product-card .title {
            font-size: 0.85rem; font-weight: 500; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 8px; color: #333;
        }
        .product-card .meta { display: flex; justify-content: space-between; align-items: center; }
        .product-card .price { font-weight: 700; color: #e53e3e; font-size: 0.95rem; }
        .product-card .similarity {
            font-size: 0.75rem; padding: 2px 8px; border-radius: 12px;
            font-weight: 600;
        }
        .sim-high { background: #dcfce7; color: #166534; }
        .sim-mid { background: #fef9c3; color: #854d0e; }
        .sim-low { background: #fee2e2; color: #991b1b; }

        .product-card .details {
            font-size: 0.75rem; color: #888; margin-top: 6px;
            display: flex; flex-wrap: wrap; gap: 4px 12px;
        }

        .product-card a { text-decoration: none; color: inherit; }

        .error-msg {
            background: #fef2f2; color: #dc2626; padding: 12px 16px;
            border-radius: 8px; margin-bottom: 16px; display: none;
        }

        .no-results { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Search by Image</h1>

        <div class="search-panel">
            <div class="tabs">
                <button class="tab active" data-tab="upload">Upload Image</button>
                <button class="tab" data-tab="url">Image URL</button>
            </div>

            <div id="tab-upload" class="tab-content active">
                <div class="upload-area" id="dropZone">
                    <input type="file" id="fileInput" accept="image/*">
                    <div class="icon">+</div>
                    <p>Drop an image here or click to browse</p>
                </div>
                <div class="preview-container" id="previewContainer" style="display:none;">
                    <img id="previewImage" alt="Preview">
                </div>
            </div>

            <div id="tab-url" class="tab-content">
                <div class="url-input-group">
                    <input type="url" id="imageUrlInput" placeholder="https://example.com/image.jpg">
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>Limit</label>
                    <input type="number" id="limitInput" value="20" min="1" max="100">
                </div>
                <div class="control-group">
                    <label>Threshold</label>
                    <input type="number" id="thresholdInput" value="0.5" min="0" max="1" step="0.05">
                </div>
                <button class="btn btn-primary" id="searchBtn" disabled>Search</button>
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Searching for similar products...</p>
        </div>

        <div id="resultsSection" style="display:none;">
            <div class="results-header">Found <span id="resultCount">0</span> similar products</div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>

        <div class="no-results" id="noResults" style="display:none;">
            No similar products found. Try a different image or lower the threshold.
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const imageUrlInput = document.getElementById('imageUrlInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const resultsSection = document.getElementById('resultsSection');
        const resultsGrid = document.getElementById('resultsGrid');
        const resultCount = document.getElementById('resultCount');
        const noResults = document.getElementById('noResults');

        let activeTab = 'upload';
        let selectedFile = null;

        // Tabs
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeTab = tab.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + activeTab).classList.add('active');
                updateSearchBtn();
            });
        });

        // File upload
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { showError('Please select an image file.'); return; }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
            };
            reader.readAsDataURL(file);
            updateSearchBtn();
        }

        imageUrlInput.addEventListener('input', updateSearchBtn);

        function updateSearchBtn() {
            if (activeTab === 'upload') searchBtn.disabled = !selectedFile;
            else searchBtn.disabled = !imageUrlInput.value.trim();
        }

        // Search
        searchBtn.addEventListener('click', doSearch);

        async function doSearch() {
            hideError();
            resultsSection.style.display = 'none';
            noResults.style.display = 'none';
            loading.style.display = 'block';
            searchBtn.disabled = true;

            const limit = document.getElementById('limitInput').value;
            const threshold = document.getElementById('thresholdInput').value;

            try {
                let response;
                if (activeTab === 'upload') {
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    if (limit) formData.append('limit', limit);
                    if (threshold) formData.append('threshold', threshold);
                    response = await fetch('/api/v1/search/image', { method: 'POST', body: formData });
                } else {
                    const url = imageUrlInput.value.trim();
                    const params = new URLSearchParams();
                    if (limit) params.set('limit', limit);
                    if (threshold) params.set('threshold', threshold);
                    response = await fetch(`/api/v1/search/image-url?${params}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image_url: url })
                    });
                }

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || `Server error (${response.status})`);
                }

                const data = await response.json();
                renderResults(data);
            } catch (err) {
                showError('Search failed: ' + err.message);
            } finally {
                loading.style.display = 'none';
                updateSearchBtn();
            }
        }

        function renderResults(data) {
            resultsGrid.innerHTML = '';
            if (!data.results || data.results.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            resultCount.textContent = data.totalResults;
            resultsSection.style.display = 'block';

            data.results.forEach(item => {
                const simPct = (item.similarity * 100).toFixed(1);
                const simClass = item.similarity >= 0.8 ? 'sim-high' : item.similarity >= 0.6 ? 'sim-mid' : 'sim-low';
                const imgSrc = item.image || (item.imageUrls && item.imageUrls[0]) || '';

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <a href="${escapeHtml(item.link || '#')}" target="_blank" rel="noopener">
                        <div class="image-wrapper">
                            ${imgSrc ? `<img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.parentElement.innerHTML='No image'">` : 'No image'}
                        </div>
                        <div class="info">
                            <div class="title">${escapeHtml(item.title || 'Untitled')}</div>
                            <div class="meta">
                                <span class="price">${escapeHtml(item.price || '-')}</span>
                                <span class="similarity ${simClass}">${simPct}%</span>
                            </div>
                            <div class="details">
                                ${item.shopName ? `<span>${escapeHtml(item.shopName)}</span>` : ''}
                                ${item.platformName ? `<span>${escapeHtml(item.platformName)}</span>` : ''}
                                ${item.categoryName ? `<span>${escapeHtml(item.categoryName)}</span>` : ''}
                                ${item.location ? `<span>${escapeHtml(item.location)}</span>` : ''}
                                ${item.salesCount ? `<span>${escapeHtml(item.salesCount)} sold</span>` : ''}
                            </div>
                        </div>
                    </a>
                `;
                resultsGrid.appendChild(card);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
        function hideError() { errorMsg.style.display = 'none'; }
    </script>
</body>
</html>
